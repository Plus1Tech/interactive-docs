<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hock International — Master Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2240;
    --navy-mid: #1a3a5c;
    --navy-light: #2a4f78;
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --cream: #f8f5ef;
    --cream-dark: #ede9e0;
    --green-fill: #e8f4ec;
    --green-text: #1e5c3a;
    --blue-fill: #e8eef8;
    --empty-border: #c9a84c;
    --shadow: 0 4px 20px rgba(13,34,64,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--cream);
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  #header {
    background: linear-gradient(135deg, var(--navy) 0%, #071529 100%);
    padding: 32px 40px 24px;
    border-bottom: 4px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 20px;
  }
  .brand-label {
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Source Serif 4', serif;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .header-sub {
    color: #7fa8c8;
    font-size: 13px;
    margin-top: 5px;
    font-style: italic;
    font-weight: 300;
  }
  .stat-box {
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 12px 22px;
    text-align: center;
    min-width: 110px;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    color: #7fa8c8;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-input, .filter-select {
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid #2a4f78;
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-size: 13px;
    font-family: 'Source Serif 4', serif;
    outline: none;
    transition: border-color .2s;
  }
  .filter-input { width: 260px; }
  .filter-input::placeholder { color: rgba(255,255,255,0.35); }
  .filter-input:focus, .filter-select:focus { border-color: var(--gold); }
  .filter-select option { background: var(--navy); color: #fff; }
  .btn-clear {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    transition: background .15s;
  }
  .btn-clear:hover { background: rgba(201,168,76,0.15); }

  /* ── MAIN ── */
  main { padding: 28px 40px 48px; }

  /* ── PHASE GROUP ── */
  .phase-group { margin-bottom: 36px; }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    border-radius: 6px 6px 0 0;
    color: #fff;
  }
  .phase-tag {
    background: rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 2px 9px;
    font-size: 11px;
    font-family: 'Source Serif 4', monospace;
    letter-spacing: 1px;
  }
  .phase-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }
  .phase-count {
    margin-left: auto;
    font-size: 11px;
    opacity: 0.65;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    box-shadow: var(--shadow);
  }
  thead tr {
    background: #f0f4f8;
    border-bottom: 2px solid #dde5ee;
  }
  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--navy-mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    font-family: 'Source Serif 4', serif;
  }
  tbody tr {
    border-bottom: 1px solid #eef1f5;
    transition: background .1s;
  }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: #f5f8ff; }
  tbody tr.row-added { background: #fffdf0; }
  td {
    padding: 10px 14px;
    font-size: 13px;
    vertical-align: top;
    line-height: 1.5;
  }

  /* ── CELLS ── */
  .phase-pill {
    display: inline-block;
    color: #fff;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: monospace;
    white-space: nowrap;
  }
  .step-cell { font-family: monospace; font-size: 12px; color: #666; white-space: nowrap; }
  .name-cell { font-weight: 600; color: var(--navy-mid); min-width: 160px; }
  .provider-pill {
    display: inline-block;
    border-radius: 4px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .provider-user { background: var(--green-fill); color: var(--green-text); }
  .provider-agent { background: var(--blue-fill); color: var(--navy-mid); }
  .where-cell { font-size: 12px; color: #666; white-space: nowrap; }
  .purpose-cell { font-size: 12px; color: #444; min-width: 200px; }

  /* ── PROMPT CELL ── */
  .prompt-cell { min-width: 240px; }
  .prompt-preview {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #b8d4b8;
    background: #f4fbf4;
    cursor: pointer;
    font-size: 12px;
    color: #2a5a2a;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: box-shadow .15s, border-color .15s;
  }
  .prompt-preview:hover { box-shadow: 0 2px 8px rgba(30,92,58,0.15); border-color: #7abf7a; }
  .prompt-snippet {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .prompt-view-hint { font-size: 10px; color: #888; }
  .prompt-empty {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px dashed var(--empty-border);
    background: #fffbf0;
    font-size: 11px;
    color: #bbb;
    display: flex;
    align-items: center;
    gap: 7px;
    min-height: 38px;
  }
  .prompt-actions { display: flex; gap: 6px; align-items: flex-start; }
  .btn-edit {
    padding: 6px 9px;
    background: #f0f4f8;
    border: 1px solid #dde5ee;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    line-height: 1;
    transition: background .15s;
  }
  .btn-edit:hover { background: #e0e8f0; }
  .saved-badge {
    font-size: 11px;
    color: var(--green-text);
    margin-top: 3px;
    display: none;
  }
  .saved-badge.show { display: block; }

  /* ── EDIT MODE ── */
  .edit-area {
    width: 100%;
    min-height: 130px;
    padding: 9px;
    border: 2px solid var(--gold);
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Source Serif 4', serif;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    color: #222;
  }
  .edit-btns { display: flex; gap: 7px; margin-top: 6px; }
  .btn-save {
    padding: 6px 14px;
    background: var(--navy-mid);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Source Serif 4', serif;
    transition: background .15s;
  }
  .btn-save:hover { background: var(--navy-light); }
  .btn-cancel {
    padding: 6px 12px;
    background: #f0f4f8;
    color: #666;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
  }

  /* ── MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #fff;
    border-radius: 10px;
    padding: 28px;
    max-width: 740px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 28px 80px rgba(0,0,0,0.35);
    animation: modal-in .2s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-meta { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    color: var(--navy-mid);
    margin-bottom: 5px;
  }
  .modal-purpose { font-size: 13px; color: #666; font-style: italic; margin-bottom: 16px; font-weight: 300; }
  .modal-close {
    float: right;
    background: none;
    border: none;
    font-size: 26px;
    cursor: pointer;
    color: #999;
    line-height: 1;
    margin-left: 12px;
    transition: color .15s;
  }
  .modal-close:hover { color: #333; }
  .modal-prompt-text {
    white-space: pre-wrap;
    font-size: 13px;
    color: #333;
    line-height: 1.75;
    background: #f5f7fc;
    padding: 18px;
    border-radius: 7px;
    border: 1px solid #dde5ee;
    font-family: 'Source Serif 4', serif;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-copy {
    padding: 9px 20px;
    background: var(--navy-mid);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Source Serif 4', serif;
    transition: background .15s;
  }
  .btn-copy:hover { background: var(--navy-light); }
  .btn-modal-edit {
    padding: 9px 16px;
    background: #f0f4f8;
    color: var(--navy-mid);
    border: 1px solid var(--gold);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--navy);
    color: #7fa8c8;
    text-align: center;
    padding: 18px;
    font-size: 12px;
    border-top: 3px solid var(--gold);
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-top">
    <div>
      <div class="brand-label">Hock International</div>
      <h1>Master Prompt Library</h1>
      <p class="header-sub">Phase-locked &nbsp;·&nbsp; Click any filled prompt to view &nbsp;·&nbsp; ✏️ to edit &nbsp;·&nbsp; Single source of truth</p>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="stat-filled">0</div>
      <div class="stat-label">/ <span id="stat-total">0</span> Filled</div>
    </div>
  </div>
  <div class="filters">
    <input class="filter-input" type="text" id="search" placeholder="Search prompt name, purpose, or text…">
    <select class="filter-select" id="filter-phase">
      <option value="">All Phases</option>
      <option value="0">Phase 0 — Project Initialization</option>
      <option value="1">Phase 1 — Textbook Content Creation</option>
      <option value="1→2">Phase 1→2 — Channel Transition</option>
      <option value="2">Phase 2 — MCQ Creation</option>
      <option value="3">Phase 3 — Presentation / Slice Creation</option>
      <option value="4">Phase 4 — Slide Script Creation</option>
      <option value="5">Phase 5 — Flashcards (Optional)</option>
      <option value="6">Phase 6 — Close-Out</option>
    </select>
    <select class="filter-select" id="filter-provider">
      <option value="">All Providers</option>
      <option value="User">User</option>
      <option value="Agent">Agent</option>
    </select>
    <button class="btn-clear hidden" id="btn-clear">Clear Filters</button>
  </div>
</div>

<main id="main"></main>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-purpose" id="modal-purpose"></div>
    <pre class="modal-prompt-text" id="modal-body"></pre>
    <div class="modal-actions">
      <button class="btn-copy" id="btn-copy">Copy Prompt</button>
      <button class="btn-modal-edit" id="btn-modal-edit">✏️ Edit</button>
    </div>
  </div>
</div>

<footer>✅ Single source of truth &nbsp;·&nbsp; Phase-locked &nbsp;·&nbsp; Agent-ready &nbsp;·&nbsp; n8n routing compatible</footer>

<script>
const PHASES = {
  "0":   { label: "Project Initialization",         color: "#1a3a5c" },
  "1":   { label: "Textbook Content Creation",      color: "#1e5c3a" },
  "1→2": { label: "Channel Transition",             color: "#5c3a1e" },
  "2":   { label: "MCQ Creation",                   color: "#3a1e5c" },
  "3":   { label: "Presentation / Slice Creation",  color: "#5c1e3a" },
  "4":   { label: "Slide Script Creation",          color: "#1e3a5c" },
  "5":   { label: "Flashcards (Optional)",          color: "#3a5c1e" },
  "6":   { label: "Close-Out",                      color: "#5c4a1e" },
};
const PHASE_ORDER = ["0","1","1→2","2","3","4","5","6"];

const DATA = [
  { id:1, phase:"0", step:"Init", name:"New Project Initialization Prompt", who:"User", where:"Project Instructions",
    purpose:"Establish certification, role, assets, integrations, and global rules. Unlocks process.",
    prompt:`# [CERTIFICATION_NAME] Content Expert — HOCK International

## Role
Expert content developer creating exam prep materials (textbooks, MCQs, presentation outlines, slide scripts, flashcards) for professional certification candidates with 2-4 years of relevant experience studying for [CERTIFICATION_NAME].

## Source Documents & Assets
- Syllabus: [CERT]_Syllabus.pdf
- Standards: [STANDARDS_DOC].pdf
- Textbook: [TEXTBOOK_NAME].md
- MCQs: [MCQ_FILE_NAME].xlsx or similar
- Presentation: Gamma link or outline Markdown
- Slide Script: [SCRIPT_NAME].md or .docx
- Other: Use uploaded files directly (e.g., Gamma exports, monday attachments)

## Integrations
- monday.com connector: Update Content Production board (https://hock-internationalcompany.monday.com/boards/18398486903)
- Gamma connector: Create presentations using Hock International Theme

## Content Creation Guides
Always follow the user-specified guide. Do not blend rules.
| Content Type          | Guide File                     | Purpose                              |
|-----------------------|-------------------------------|--------------------------------------|
| Textbooks             | Textbook_Creation_Guide.md    | Structure, tone, prose-dominant      |
| MCQs                  | MCQ_Creation_Guide.md         | Questions, distractors, explanations |
| Presentation Outlines | Presentation_Outline_Guide.md | Slide structure, visuals, Gamma      |
| Slide Scripts         | Slide_Script_Guide.md         | Narration, cues, timing              |
| Flashcards            | Flashcard_Guide.md            | Card format, spaced repetition       |

## Process: ALWAYS Confirm Before Generating
Follow Content_Creation_Skill.md for routing, depth calibration, production order, and shared principles.

Production Order (must complete upstream first):
1. Textbook → MCQs → Presentation Outline → Gamma creation → Slide Script → Flashcards
2. After completing each deliverable: If requested by user, update the corresponding monday.com task.

Core Steps:
1. Use Depth_Calibration_Guide.md first: Present summary table, wait for YES/adjustments.
2. Generate using specified guide. Reference upstream assets by name.
3. Apply Token_Optimization_Guide.md: Chunk long outputs, reference don't repeat, checkpoint mid-generation.
4. For Gamma: Create outline in chat first, confirm, then use Gamma connector.
5. For monday: Search existing task by name, update Status/Assignee/Due Date/Description/File columns.

## Key Rules
- Use [CERTIFYING_BODY] terminology.
- Cite standards by number from [STANDARDS_DOC].pdf.
- Never generate without depth confirmation.
- Token efficiency: Always chunk comprehensive outputs; pause for user check.
- monday/Gamma: Confirm connector access before actions; update existing tasks only unless user confirms new.
- Ambiguous requests: Ask "Which content type? Textbook, MCQs, outline, script, flashcards?"`},

  { id:2, phase:"1", step:"1.1", name:"Textbook Section Prompt", who:"User", where:"Chat",
    purpose:"Generate textbook content for specified Section ID. Run Depth Calibration, then Textbook Creation Guide.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

Create textbook content for [SECTION_ID] from the uploaded syllabus.

Section: [e.g., "3c. Cybersecurity Risks"]
Certification: [CIA Part 2]

Process:
1. Confirm prerequisites: Syllabus and standards documents uploaded?
2. Apply Depth Calibration Skill: Analyze scope, cognitive level, exam weight. Present summary table and recommended depth. Wait for my YES or adjustments.
3. Follow Textbook Creation Skills: Prose-dominant (65% narrative), integrate standards naturally by number.
4. Apply Token Optimization Skill: Chunk if comprehensive depth; pause after first segment for check.
5. Output in Markdown: Start with H1, use hierarchy, end with Summary paragraph.

Integrate relevant standards from uploaded standards document.`},

  { id:3, phase:"1", step:"1.2", name:"Expand Section Prompt", who:"User", where:"Chat",
    purpose:"Expand only the specified portion of the textbook. Preserve all else.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

Expand the specified part of the previously generated textbook section for this ID. Add content only where described — keep all else identical.

Section: [SECTION_ID, e.g., "3c. Cybersecurity Risks"]
Certification: [CIA Part 2]

Expansion needed:
- [Describe what to add, e.g., "Add 2 examples under H2: Emerging Risks"]

If expansion affects depth, re-apply Depth Calibration Skill briefly and note changes.
Follow Textbook Creation Skills: Prose-dominant, integrate standards naturally.
Apply Token Optimization: Checkpoint if adding >1k words.
Output full revised section in Markdown.`},

  { id:4, phase:"1", step:"1.2", name:"Condense Section Prompt", who:"User", where:"Chat",
    purpose:"Reduce or shorten only specified content.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

- [Describe what to shorten, e.g., "Reduce H3: Data Security by 30%, remove redundant bullets"]

If condensation affects depth, re-apply Depth Calibration Skill briefly and note changes.
Follow Textbook Creation Skills: Prose-dominant, integrate standards naturally.
Apply Token Optimization: Keep edits minimal.
Output full revised section in Markdown.`},

  { id:5, phase:"1", step:"1.2", name:"Rewrite Section Prompt", who:"User", where:"Chat",
    purpose:"Rewrite specified text without changing structure unless stated.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

- [Describe changes, e.g., "Make tone more conversational in intro; fix accuracy in Standard 5.1 reference"]

Apply Token Optimization: Edit only targeted areas.
Output full revised section in Markdown.`},

  { id:6, phase:"1", step:"1.2", name:"Insert Content Prompt", who:"User", where:"Chat",
    purpose:"Insert new content at a defined location.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

- [Describe what/where, e.g., "Add new H3: Mitigation Strategies after H2, ~300 words on best practices"]

Output full revised section in Markdown.`},

  { id:7, phase:"1", step:"1.2", name:"Format-Only Prompt", who:"User", where:"Chat",
    purpose:"Change formatting only. No content edits.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

Certification: [CIA Part 2]

Formatting needed:
- [Describe changes, e.g., "Convert bullets to numbered steps in Process section; fix header levels"]

Follow Textbook Creation Skills: Use proper hierarchy.
Apply Token Optimization: Minimal edits.
Output full revised section in Markdown.`},

  { id:8, phase:"1", step:"1.2", name:"Fallback General Revision Prompt", who:"User", where:"Chat",
    purpose:"Mixed or complex revisions when no specific prompt applies.",
    prompt:`You are a HOCK International Content Expert creating exam prep textbooks for internal auditors with 2-4 years experience studying for CIA Part 2.

Section: [SECTION_ID, e.g., "3c. Cybersecurity Risks"]
Certification: [CIA Part 2]

Changes needed:
- [Describe specific change 1, e.g., "Fix tone in intro"]
- [Describe specific change 2]

If changes affect depth, re-apply Depth Calibration Skill briefly.
Follow Textbook Creation Skills: Prose-dominant, integrate standards naturally from uploaded document.
Apply Token Optimization: Checkpoint for long edits.
Output full revised section in Markdown.`},

  { id:9, phase:"1", step:"1.4", name:"Add Textbook to Dropbox (implicit YES)", who:"Agent", where:"Chat → Tool",
    purpose:"Upload finalized textbook to Dropbox using naming conventions.", prompt:""},

  { id:10, phase:"1", step:"1.5", name:"Add Textbook to Mondays", who:"Agent", where:"Chat → Monday Tool",
    purpose:"Update existing Monday task status and attach textbook.",

// ── STATE ──
let prompts = DATA.map(d => ({ ...d }));
let editingId = null;
let openModalId = null;

function filledCount() { return prompts.filter(p => p.prompt.trim()).length; }

function updateStat() {
  document.getElementById('stat-filled').textContent = filledCount();
  document.getElementById('stat-total').textContent = prompts.length;
}

// ── RENDER ──
function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const phase  = document.getElementById('filter-phase').value;
  const prov   = document.getElementById('filter-provider').value;
  const hasFilter = search || phase || prov;
  document.getElementById('btn-clear').classList.toggle('hidden', !hasFilter);

  const filtered = prompts.filter(r => {
    if (phase && r.phase !== phase) return false;
    if (prov  && r.who !== prov)   return false;
    if (search && ![r.name, r.purpose, r.prompt].some(t => t.toLowerCase().includes(search))) return false;
    return true;
  });

  const main = document.getElementById('main');
  main.innerHTML = '';

  PHASE_ORDER.forEach(ph => {
    const rows = filtered.filter(r => r.phase === ph);
    if (!rows.length) return;
    const pi = PHASES[ph];

    const group = document.createElement('div');
    group.className = 'phase-group';

    group.innerHTML = `
      <div class="phase-header" style="background:${pi.color}">
        <span class="phase-tag">PHASE ${ph}</span>
        <span class="phase-title">${pi.label}</span>
        <span class="phase-count">${rows.length} prompt${rows.length!==1?'s':''}</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Phase</th><th>Step</th><th>Prompt Name</th>
            <th>Who Provides</th><th>Where Used</th>
            <th>Purpose / Agent Interpretation</th><th>Prompt</th>
          </tr></thead>
          <tbody id="tbody-${ph.replace('→','_')}"></tbody>
        </table>
      </div>`;
    main.appendChild(group);

    const tbody = group.querySelector('tbody');
    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      if (i % 2 !== 0) tr.style.background = '#fafbfc';
      if (row.name.includes('⭐')) tr.style.background = '#fffdf0';

      tr.innerHTML = `
        <td><span class="phase-pill" style="background:${pi.color}">${row.phase}</span></td>
        <td class="step-cell">${row.step}</td>
        <td class="name-cell">${row.name}</td>
        <td><span class="provider-pill ${row.who==='User'?'provider-user':'provider-agent'}">${row.who}</span></td>
        <td class="where-cell">${row.where}</td>
        <td class="purpose-cell">${row.purpose}</td>
        <td class="prompt-cell" id="cell-${row.id}"></td>`;
      tbody.appendChild(tr);
      renderCell(row.id);
    });
  });

  updateStat();
}

function renderCell(id) {
  const row = prompts.find(r => r.id === id);
  const cell = document.getElementById('cell-'+id);
  if (!cell) return;

  if (editingId === id) {
    cell.innerHTML = `
      <textarea class="edit-area" id="ta-${id}">${escHtml(row.prompt)}</textarea>
      <div class="edit-btns">
        <button class="btn-save" onclick="saveEdit(${id})">Save</button>
        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
      </div>`;
    const ta = document.getElementById('ta-'+id);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = ta.value.length;
    return;
  }

  const promptActions = `<button class="btn-edit" onclick="startEdit(${id})" title="Edit prompt">✏️</button>`;

  if (row.prompt.trim()) {
    const snippet = row.prompt.substring(0, 110) + '…';
    cell.innerHTML = `
      <div class="prompt-actions">
        <div class="prompt-preview" onclick="openModal(${id})">
          <span class="prompt-snippet">${escHtml(snippet)}</span>
          <span class="prompt-view-hint">👁 View full prompt</span>
        </div>
        ${promptActions}
      </div>
      <div class="saved-badge" id="saved-${id}">✓ Saved</div>`;
  } else {
    cell.innerHTML = `
      <div class="prompt-actions">
        <div class="prompt-empty">⬜ Not yet added</div>
        ${promptActions}
      </div>`;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── EDIT ──
function startEdit(id) {
  editingId = id;
  renderCell(id);
}
function cancelEdit() {
  editingId = null;
  render();
}
function saveEdit(id) {
  const ta = document.getElementById('ta-'+id);
  if (!ta) return;
  prompts.find(r => r.id === id).prompt = ta.value;
  editingId = null;
  render();
  const badge = document.getElementById('saved-'+id);
  if (badge) { badge.classList.add('show'); setTimeout(() => badge.classList.remove('show'), 1800); }
}

// ── MODAL ──
function openModal(id) {
  const row = prompts.find(r => r.id === id);
  openModalId = id;
  document.getElementById('modal-meta').textContent    = `Phase ${row.phase}  ·  Step ${row.step}  ·  ${row.who}`;
  document.getElementById('modal-title').textContent   = row.name;
  document.getElementById('modal-purpose').textContent = row.purpose;
  document.getElementById('modal-body').textContent    = row.prompt || '(No prompt text yet — click ✏️ to add one.)';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  openModalId = null;
}
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal-overlay').onclick = e => { if (e.target.id === 'modal-overlay') closeModal(); };
document.getElementById('btn-copy').onclick = () => {
  const row = prompts.find(r => r.id === openModalId);
  if (!row || !row.prompt) return;
  navigator.clipboard.writeText(row.prompt);
  const btn = document.getElementById('btn-copy');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
};
document.getElementById('btn-modal-edit').onclick = () => {
  closeModal();
  startEdit(openModalId);
  setTimeout(() => {
    const cell = document.getElementById('cell-'+openModalId);
    if (cell) cell.scrollIntoView({ behavior:'smooth', block:'center' });
  }, 100);
};

// ── FILTERS ──
document.getElementById('search').oninput = render;
document.getElementById('filter-phase').onchange = render;
document.getElementById('filter-provider').onchange = render;
document.getElementById('btn-clear').onclick = () => {
  document.getElementById('search').value = '';
  document.getElementById('filter-phase').value = '';
  document.getElementById('filter-provider').value = '';
  render();
};

// ── INIT ──
render();
</script>
</body>
</html>
